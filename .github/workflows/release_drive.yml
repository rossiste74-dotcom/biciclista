name: Release APK to Drive and Supabase

on:
  push:
    branches:
      - main

jobs:
  build_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Get current app version
        id: get_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        # We use github.run_number to ensure the build number is always incremented
        run: flutter build apk --release --build-number ${{ github.run_number }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.get_version.outputs.version }}-b${{ github.run_number }}"
          name: "Biciclista Release v${{ steps.get_version.outputs.version }} (Build ${{ github.run_number }})"
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Formattiamo l'URL di download diretto dell'asset pubblicato su GitHub
          # L'URL di Github Releases per gli asset caricati è tipicamente:
          # https://github.com/[OWNER]/[REPO]/releases/download/[TAG_NAME]/[FILE_NAME]
          
          REPO="${{ github.repository }}"
          TAG="v${{ steps.get_version.outputs.version }}-b${{ github.run_number }}"
          DOWNLOAD_URL="https://github.com/$REPO/releases/download/$TAG/app-release.apk"
          
          curl -X POST "$SUPABASE_URL/rest/v1/app_versions" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"version_name\": \"${{ steps.get_version.outputs.version }}\",
              \"build_number\": ${{ github.run_number }},
              \"apk_url\": \"$DOWNLOAD_URL\",
              \"release_notes\": \"Nuovi sentieri disponibili nella versione ${{ steps.get_version.outputs.version }}!\"
            }"
